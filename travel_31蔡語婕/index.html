<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣景點介紹</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>台灣熱門景點</h1>
  <p>一起探索美麗的台灣！</p>
</header>

<div class="container">
  
  <div class="card">
    <img src="101.jpg" style="width:500px; height:500px; object-fit:cover;">
    <h2>台北101</h2>
    <p>
      台北101是台灣著名地標，
      擁有高速電梯與觀景台，
      夜景非常漂亮。
    </p>
  </div>

  <div class="card">
    <img src="Yue.jpg" style="width:500px; height:500px; object-fit:cover;">
    <h2>日月潭</h2>
    <p>
      日月潭位於南投，
      湖景優美，
      適合騎腳踏車與搭船遊湖。
    </p>
  </div>

  <div class="card">
    <img src="Li.jpg" style="width:500px; height:500px; object-fit:cover;">
    <h2>阿里山</h2>
    <p>
      阿里山以日出、
      雲海與森林鐵路聞名，
      是台灣熱門旅遊景點。
    </p>
  </div>

  <div class="card">
    <img src="ding.jpg" style="width:500px; height:500px; object-fit:cover;">
    <h2>墾丁</h2>
    <p>
      墾丁有美麗海灘與陽光，
      很適合夏天旅遊與水上活動。
    </p>
  </div>

</div>
<footer></footer>
 南投高中電子商務科 | 蔡語婕
</footer>
</body>
</html>
